excerpts:
  - {id: ART-001-excerpt-01, document_id: ART-001, page: 11, section_id: ART-001-primary, evidence_type: primary_text, text: "Excma. Junta de Buenos Ayres, que tan dignamente nos regenta.", topics: [Buenos Aires], concepts: [Buenos Aires, conducción revolucionaria], priority: 80, review_status: reviewed}
  - {id: ART-002-excerpt-01, document_id: ART-002, page: 15, section_id: ART-002-primary, evidence_type: primary_text, text: "La soberanía particular de los pueblos sera precisam. declarada y ostentada, como objeto unico de ntra revolucion.", topics: [Soberanía popular, Soberanía provincial], concepts: [soberanía de los pueblos, autonomía], priority: 90, review_status: reviewed}
  - {id: ART-003-excerpt-01, document_id: ART-003, page: 18, section_id: ART-003-primary, evidence_type: primary_text, text: "Mi autoridad emana de vosotros, y ella sesa por vra presencia Soberana.", topics: [Soberanía popular], concepts: [legitimidad, soberanía popular], priority: 100, review_status: reviewed}
  - {id: ART-004-excerpt-01, document_id: ART-004, page: 22, section_id: ART-004-primary, evidence_type: primary_text, text: "presentado asi el Pueblo Oriental como Soberano, despues de haverse sersiorado bastantem. de las ordenes", topics: [Soberanía popular, Soberanía provincial], concepts: [pueblo soberano, reconocimiento condicionado], priority: 90, review_status: reviewed}
  - {id: ART-005-excerpt-01, document_id: ART-005, page: 26, section_id: ART-005-primary, evidence_type: primary_text, text: "No admitirá otro Sistema que el de Confederacion para el pacto recíproco con las Provincias que formen nuestro Estado.", topics: [Soberanía provincial, Federalismo], concepts: [confederación, pacto recíproco], priority: 100, review_status: reviewed}
  - {id: ART-005-excerpt-02, document_id: ART-005, page: 26, section_id: ART-005-primary, evidence_type: primary_text, text: "Promoverá la Libertad civil, y Religiosa en toda su extencion imaginable.", topics: [Libertad civil, Libertad religiosa], concepts: [libertad civil, libertad religiosa], priority: 95, review_status: reviewed}
  - {id: ART-005-excerpt-03, document_id: ART-005, page: 26, section_id: ART-005-primary, evidence_type: primary_text, text: "Asi este como aquel se dividirán en poder Legislativo, Executivo, y Judicial.", topics: [Gobierno republicano], concepts: [separación de poderes, república], priority: 90, review_status: reviewed}
  - {id: ART-005-excerpt-04, document_id: ART-005, page: 27, section_id: ART-005-primary, evidence_type: primary_text, text: "Que presisa é indispensable, sea fuera de B.s A.s donde recida el citio del Govierno de las Provincias vnidas.", topics: [Buenos Aires, Centralismo], concepts: [capital federal, centralismo porteño], priority: 95, review_status: reviewed}
  - {id: ART-005-excerpt-05, document_id: ART-005, page: 27, section_id: ART-005-primary, evidence_type: primary_text, text: "ni los Barcos destinados de esta Provincia á otra serán obligados á entrar á anclar, ó pagar derechos en otra.", topics: [Aduanas y comercio], concepts: [libertad portuaria, derechos], priority: 85, review_status: reviewed}
  - {id: ART-006-excerpt-01, document_id: ART-006, page: 31, section_id: ART-006-primary, evidence_type: primary_text, text: "Es preciso pues, q. ese pueblo puesto en el pleno goze de sus dros restablezca su dignidad y grandeza entrando á su exercicio;", topics: [Soberanía popular], concepts: [derechos provinciales, organización], priority: 90, review_status: reviewed}
  - {id: ART-007-excerpt-01, document_id: ART-007, page: 35, section_id: ART-007-primary, evidence_type: primary_text, text: "Yo deseo q. los Indios en sus Pueblos se goviernen p. si p. q. cuiden de sus intereses como nosotros delos nros.", topics: [Pueblos indígenas, Grupos marginados, Soberanía popular, Soberanía provincial], concepts: [autogobierno indígena, intereses comunitarios], priority: 100, review_status: reviewed}
  - {id: ART-008-excerpt-01, document_id: ART-008, page: 38, section_id: ART-008-primary, evidence_type: primary_text, text: "Toda Provincia tiene igual dignidad, iguales privilegios y derechos, y cada una renunciará el proyecto de subyugar á otra", topics: [Soberanía provincial, Centralismo], concepts: [igualdad provincial, no subyugación], priority: 100, review_status: reviewed}
  - {id: ART-009-excerpt-01, document_id: ART-009, page: 43, section_id: ART-009-primary, evidence_type: primary_text, text: "reuniendo á este fin el congreso general de los pueblos y provincias q. se hallan bajo mis ordenes y proteccion", topics: [Soberanía provincial], concepts: [congreso, diputación provincial], priority: 90, review_status: reviewed}
  - {id: ART-010-excerpt-01, document_id: ART-010, page: 47, section_id: ART-010-primary, evidence_type: primary_text, text: "Los ezclavos de q. echó mano el Gob. anterior p. seguridad de esa Plasa, deben conservar su Libertad, y mantenerse en serv. de ella misma.", topics: [Grupos marginados, Autoridad civil y militar], concepts: [libertad de esclavizados, servicio militar], priority: 100, review_status: reviewed}
  - {id: ART-011-excerpt-01, document_id: ART-011, page: 50, section_id: ART-011-primary, evidence_type: primary_text, text: "Conosco las ventajas de una Biblioteca publica, y espero q. VS. cooperará con su esfuerzo, é influxo á perfeccionarla", topics: [Educación, Biblioteca pública], concepts: [biblioteca pública, instrucción], priority: 100, review_status: reviewed}
  - {id: ART-012-excerpt-01, document_id: ART-012, page: 54, section_id: ART-012-primary, evidence_type: primary_text, text: "los mas infelices Seran los mas previlegiados.", topics: [Grupos marginados], concepts: [prioridad social, distribución], priority: 100, review_status: reviewed}
  - {id: ART-012-excerpt-02, document_id: ART-012, page: 54, section_id: ART-012-primary, evidence_type: primary_text, text: "los Negros Libres; Los Sambos de esta clase, los Indios, y los Criollos pobres todos podran Ser agraciados en Suertes de Estancia", topics: [Distribución de tierras, Sociedad rural, Grupos marginados, Pueblos indígenas], concepts: [beneficiarios, suertes de estancia], priority: 95, review_status: reviewed}
  - {id: ART-012-excerpt-03, document_id: ART-012, page: 54, section_id: ART-012-primary, evidence_type: primary_text, text: "El S.or Alc.e Prov.l á demas de Sus facultades ordinarias, queda autorizado p. distribuir Terrenos, y velar Sobre la Tranquilidad del Vecindario", topics: [Distribución de tierras, Autoridad civil y militar], concepts: [autoridad provincial, policía de campaña], priority: 90, review_status: reviewed}
  - {id: ART-013-excerpt-01, document_id: ART-013, page: 60, section_id: ART-013-primary, evidence_type: primary_text, text: "Los que vengan de los Puertos, que reconocen la presente federacion, nada pagarán", topics: [Aduanas y comercio, Liga de los Pueblos Libres, Federalismo], concepts: [preferencia confederal, derechos aduaneros], priority: 100, review_status: reviewed}
  - {id: ART-013-excerpt-02, document_id: ART-013, page: 60, section_id: ART-013-primary, evidence_type: primary_text, text: "los efectos de vltramar, que vengan de Buen.s A.s y Puertos de su Dependencia pagarán vn 25 p.r c.to sobre el aforo de sus Guias.", topics: [Buenos Aires, Aduanas y comercio], concepts: [arancel, Buenos Aires], priority: 95, review_status: reviewed}
  - {id: ART-013-excerpt-03, document_id: ART-013, page: 61, section_id: ART-013-primary, evidence_type: primary_text, text: "Los Libros, y Todo instrumento de Artes y ciencias.", topics: [Educación], concepts: [libros, ciencias], priority: 90, review_status: reviewed}
  - {id: ART-014-excerpt-01, document_id: ART-014, page: 65, section_id: ART-014-primary, evidence_type: primary_text, text: "Tengo p. remitir a V.S. el compendio dela historia de Norte America, ancioso de q. sus luces basten á esclarecer las ideas de esos Magistrados", topics: [Educación, Gobierno republicano], concepts: [formación de magistrados, Norteamérica], priority: 100, review_status: reviewed}
  - {id: ART-015-excerpt-01, document_id: ART-015, page: 69, section_id: ART-015-primary, evidence_type: primary_text, text: "Ruego a V.E. que ellos y sus presas tengan el mayor asilo en los Puertos y entre la Escuadra de su mando; que su Pabellon sea respetado", topics: [Aduanas y comercio], concepts: [corso, pabellón, relaciones exteriores], priority: 100, review_status: reviewed}

